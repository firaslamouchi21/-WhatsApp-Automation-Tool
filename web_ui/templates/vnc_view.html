{% extends "base.html" %}
{% block title %}WhatsApp Web - VNC{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0"><i class="bi bi-display me-2"></i>WhatsApp Web</h5>
        <div>
            <a href="/" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
            </a>
        </div>
    </div>
    <div class="card-body p-0">
        <div id="vnc-container">
            <iframe src="http://localhost:6080/vnc.html?autoconnect=true&resize=scale&password=vncpassword" 
                    id="vnc-iframe" allow="fullscreen">
            </iframe>
        </div>
    </div>
    <div class="card-footer bg-light">
        <div class="row">
            <div class="col-md-8">
                <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i>
                    Use your mouse and keyboard to interact with WhatsApp Web. 
                    Make sure you're logged in to WhatsApp on your phone.
                </small>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-sm btn-outline-primary" onclick="fullscreenVNC()">
                    <i class="bi bi-fullscreen me-1"></i>Fullscreen
                </button>
            </div>
        </div>
    </div>
</div>

<style>
#vnc-container { height: 80vh; min-height: 600px; border-radius: 0 0 8px 8px; overflow: hidden; }
#vnc-iframe { width: 100%; height: 100%; border: none; background: #000; }
</style>

<script>
function fullscreenVNC() {
    const iframe = document.getElementById('vnc-iframe');
    iframe.requestFullscreen?.() || iframe.webkitRequestFullscreen?.() || iframe.msRequestFullscreen?.();
}
</script>
{% endblock %}
