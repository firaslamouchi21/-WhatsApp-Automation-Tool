website_development_ar:
  name: "تطوير المواقع الإلكترونية"
  subject: "عرض تطوير موقع إلكتروني احترافي"
  template: |
    السلام عليكم {business_name}،

    لاحظت نشاطكم التجاري على خرائط جوجل، وما شاء الله تقييماتكم ممتازة، لكن لاحظت أنكم تحتاجون موقع إلكتروني احترافي لعرض أعمالكم.

    أنا متخصص في بناء مواقع سريعة جداً ومرتبطة بالواتساب مباشرة، بحيث تصلكم الطلبات منظمة وبكل سهولة.

    هل أنتم مهتمون بتجربة نسخة تجريبية سريعة لما يمكننا بناؤه لكم؟

    مع تحياتي،
    فريق التطوير التقني
  variables: ["business_name"]
  language: ar

app_maintenance_ar:
  name: "صيانة التطبيقات"
  subject: "حافظ على كفاءة تطبيقك"
  template: |
    السلام عليكم {business_name}،

    هل تطبيقكم الحالي يعمل ببطء أو تظهر فيه بعض المشاكل التقنية؟

    نحن نقدم خدمات احترافية لصيانة وتحسين أداء التطبيقات لضمان تجربة سلسة لعملائكم.

    أخبرنا إذا كنتم ترغبون في الحصول على تقرير مجاني لتقييم أداء تطبيقكم!

    مع تحياتي،
    فريق الدعم الفني
  variables: ["business_name"]
  language: ar
