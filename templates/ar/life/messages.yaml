fitness_coaching_ar:
  name: "تدريب رياضي"
  subject: "حقق أهدافك الصحية"
  template: |
    السلام عليكم {business_name}،

    هل تبحث عن تحسين لياقتك البدنية هذا العام؟

    نحن نقدم تدريباً رياضياً شخصياً وخططاً غذائية مصممة لتناسب نمط حياتكم المزدحم.

    هل ترغبون في تجربة حصة تعريفية مجانية؟

    مع تحياتي،
    فريق الصحة والرشاقة
  variables: ["business_name"]
  language: ar

home_cleaning_ar:
