  template: |
    السلام عليكم {business_name}،

    الحياة مليئة بالمشاغل! لماذا تقضي عطلة نهاية الأسبوع في التنظيف؟

    خدماتنا الاحترافية لتنظيف المنازل موثوقة وشاملة وبأسعار معقولة.

    هل يمكننا تزويدكم بعرض سعر مجاني؟

