meeting_request_ar:
  name: "طلب اجتماع"
  subject: "طلب اجتماع قصير"
  template: |
    السلام عليكم {business_name}،

    أود تحديد موعد لاجتماع قصير لمناقشة فرص التعاون المحتملة بين شركاتنا.

    هل لديكم وقت لمكالمة لمدة 15 دقيقة خلال هذا الأسبوع؟

    مع تحياتي،
    فريق الخدمات المهنية
  variables: ["business_name"]
  language: ar

project_update_ar:
  name: "تحديث المشروع"
  subject: "تحديث بخصوص المشروع الحالي"
  template: |
    السلام عليكم {business_name}،

    أردت تزويدكم بتحديث سريع بخصوص سير العمل في مشروعنا الحالي.

    كل شيء يسير حسب الجدول الزمني المحدد، ونتوقع إنجاز المرحلة القادمة بحلول يوم الجمعة.

    أخبرنا إذا كان لديكم أي استفسار!

    مع تحياتي،
    فريق إدارة المشاريع
  variables: ["business_name"]
  language: ar
