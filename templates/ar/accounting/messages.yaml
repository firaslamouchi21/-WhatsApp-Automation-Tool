tax_filing_ar:
  name: "المساعدة في الإقرارات الضريبية"
  subject: "سهّل عليك موسم الضرائب"
  template: |
    السلام عليكم {business_name}،

    موسم الضرائب يقترب! هل تشعر بالارتباك من كثرة الأوراق والحسابات؟

    نحن نقدم خدمات شاملة لتقديم الإقرارات الضريبية والتخطيط المالي المصممة خصيصاً للشركات الصغيرة.

    هل ترغب في تحديد موعد لاستشارة سريعة لنرى كيف يمكننا مساعدتك في توفير المال هذا العام؟

    مع تحياتي،
    فريق الخدمات المحاسبية
  variables: ["business_name"]
  language: ar

bookkeeping_ar:
  name: "المحاسبة الشهرية"
  subject: "ركز على عملك واترك الأرقام لنا"
  template: |
    السلام عليكم {business_name}،

    إدارة الأعمال صعبة بما يكفي دون القلق بشأن كل عملية مالية صغيرة.

    خدماتنا المحاسبية الشهرية تضمن أن سجلاتكم دائماً محدثة ودقيقة تماماً.

    هل أنتم مهتمون بمعرفة المزيد عن باقاتنا؟

    مع تحياتي،
    فريق الإدارة المالية
  variables: ["business_name"]
  language: ar
