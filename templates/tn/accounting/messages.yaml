tax_filing_tn:
  name: "المساعدة في الضرائب (تونسي)"
  subject: "سهل على روحك حكايات الضرائب"
  template: |
    مرحبا {business_name}،

    وقت الضرائب قرب! فديت من الـ كوارط والـ حسابات؟

    نحن نعاونوكم في الـ déclaration des impôts والـ planning financier للشركات الصغار.

    تحبو نحددو موعد نحكيو فيه كيفاش تنجمو تنقصو في المصاريف العام هذا؟

    ربي يوفق،
    فريق المحاسبة
  variables: ["business_name"]
  language: tn

bookkeeping_tn:
  name: "المحاسبة الشهرية (تونسي)"
  subject: "ركز في خدمتك وخلي الأرقام علينا"
  template: |
    مرحبا {business_name}،

    تسيير شركة موش ساهل، زيد عليهم الـ حسابات متاع كل نهار تولي صعيبة برشة.

    خدمتنا متاع الـ comptabilité mensuelle تخلي أموركم ديما واضحة ومنظمة.

    تحبو تعرفو أكثر على الـ packages متاعنا؟

    ربي يوفق،
    فريق الإدارة المالية
  variables: ["business_name"]
  language: tn
