meeting_request_tn:
  name: "طلب اجتماع (تونسي)"
  subject: "طلب موعد صغير"
  template: |
    مرحبا {business_name}،

    نحب نحدد موعد معاك باش نحكيو في إمكانية تعاون بين شركاتنا.

    تنجم نتقابلو والا نحكيو في التليفون 15 دقيقة الجمعة هذه؟

    ربي يوفق،
    فريق الخدمات
  variables: ["business_name"]
  language: tn

project_update_tn:
  name: "تحديث المشروع (تونسي)"
  subject: "تحديث على الخدمة إلي ماشية"
  template: |
    مرحبا {business_name}،

    حبيت نعطيك تحديث صغير على الخدمة متاعنا توة.

    كل شيء ماشي مريغل وحسب الوقت، وباش نكملو المرحلة الجاية نهار الجمعة إن شاء الله.

    كان عندك أي سؤال، قولي!

    ربي يوفق،
    فريق إدارة المشاريع
  variables: ["business_name"]
  language: tn
