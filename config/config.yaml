# WhatsApp Automation Tool Configuration

whatsapp:
  rate_limit_delay: 20  # seconds between messages
  wait_time: 10         # seconds to wait for WhatsApp Web
  tab_close: true       # close tab after sending
  close_time: 3          # seconds before closing tab
  max_retries: 3        # maximum retry attempts

logging:
  level: "INFO"
  log_file: "logs/whatsapp_automation.log"
  max_file_size: 10485760  # 10MB
  backup_count: 5

processing:
  batch_size: 100
  parallel_processing: false
  max_workers: 4
  resume_on_failure: true

templates_dir: "config/templates"
data_dir: "data"
output_dir: "output"
