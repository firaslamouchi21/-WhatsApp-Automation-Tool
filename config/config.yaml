whatsapp:
  rate_limit_delay: 20
  wait_time: 10
  tab_close: true
  close_time: 3
  max_retries: 3

logging:
  level: "INFO"
  log_file: "logs/whatsapp_automation.log"
  max_file_size: 10485760
  backup_count: 5

processing:
  batch_size: 100
  parallel_processing: false
  max_workers: 4
  resume_on_failure: true

templates_dir: "config/templates"
data_dir: "data"
output_dir: "output"
